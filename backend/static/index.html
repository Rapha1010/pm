<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PM2 Backend Hello</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        margin: 0;
        padding: 48px;
        background: #f6f7fb;
        color: #032147;
      }

      .card {
        max-width: 640px;
        background: #ffffff;
        border: 1px solid #e4e7f1;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 24px rgba(3, 33, 71, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .label {
        font-size: 14px;
        color: #888888;
      }

      .value {
        margin-top: 8px;
        font-size: 18px;
        color: #209dd7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello from the PM2 backend</h1>
      <div class="label">API response:</div>
      <div id="api-message" class="value">Loading...</div>
    </div>

    <script>
      async function loadMessage() {
        const target = document.getElementById("api-message");
        try {
          const response = await fetch("/api/hello");
          const data = await response.json();
          target.textContent = data.message || "No message returned";
        } catch (error) {
          target.textContent = "Unable to reach /api/hello";
        }
      }

      loadMessage();
    </script>
  </body>
</html>
